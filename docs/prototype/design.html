<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MAN'S FANTASY — v12 小紅書風格 Prototype</title>
<style>
:root {
  --bg:#0a0a0a; --surface:#161616; --surface-2:#1e1e1e;
  --fg:#e5e5e5; --fg2:#a0a0a0; --mut:#6a6a6a;
  --border:#2a2a2a; --accent:#d14334; --accent-hover:#e05545;
  --radius:8px; --app-w:560px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#000;display:flex;justify-content:center;min-height:100dvh;color:var(--fg);line-height:1.5;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;font:inherit;border:none;background:none;color:inherit}
img{max-width:100%;display:block}
.app{width:100%;max-width:var(--app-w);min-height:100dvh;background:var(--bg)}

/* search bar */
.search-bar{position:sticky;top:0;z-index:10;padding:0.6rem 0.75rem;background:rgba(10,10,10,0.96);display:flex;align-items:center;gap:0.5rem}
.search-input-wrap{flex:1;display:flex;align-items:center;gap:0.4rem;background:var(--surface-2);border-radius:20px;padding:0.4rem 0.8rem}
.search-input-wrap .icon{font-size:0.9rem;color:var(--mut)}
.search-input-wrap input{flex:1;border:none;background:none;color:var(--fg);font-size:0.82rem;outline:none}
.search-input-wrap input::placeholder{color:var(--mut)}
.search-bar .btn-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border-radius:50%;color:var(--fg2)}

/* chip bar (horizontal scroll) */
.chip-bar{display:flex;gap:0.5rem;padding:0 0.75rem 0.6rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chip-bar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:0.35rem 0.85rem;border-radius:20px;font-size:0.78rem;background:var(--surface-2);color:var(--mut);white-space:nowrap}
.chip.active{background:var(--accent);color:#fff}

/* content */
.app-content{flex:1;padding:0 0.5rem 5rem}
.tab-panel{display:none}
.tab-panel.active{display:block}
.waterfall{display:flex;gap:0.4rem}
.wf-col{flex:1;display:flex;flex-direction:column;gap:0.4rem;min-width:0}

/* card */
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden}
.card-cover{position:relative;aspect-ratio:3/4}
.card-cover img{width:100%;height:100%;object-fit:cover}
.badge-count{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.55);color:#fff;font-size:0.62rem;padding:2px 6px;border-radius:10px}
.badge-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;background:rgba(0,0,0,0.55);border-radius:50%;display:flex;align-items:center;justify-content:center}
.badge-play::after{content:'';border-left:10px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent;margin-left:2px}
.badge-duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.75);color:#fff;font-size:0.62rem;padding:2px 5px;border-radius:4px}
.card-title{padding:0.5rem 0.55rem 0;font-size:0.8rem;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;white-space:pre-wrap}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:0.45rem 0.55rem 0.5rem}
.card-author{display:flex;align-items:center;gap:0.3rem;min-width:0}
.card-author-avatar{width:16px;height:16px;border-radius:50%;background:var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.5rem;color:#fff}
.card-author-name{font-size:0.65rem;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-stats{display:flex;align-items:center;gap:0.5rem;font-size:0.65rem;color:var(--mut);flex-shrink:0}
.card-stats span{display:flex;align-items:center;gap:2px}

/* text-only card */
.card.text-only{margin-bottom:0.4rem}
.card.text-only .card-title{padding:0.6rem 0.65rem 0;font-size:0.84rem;-webkit-line-clamp:4}
.card.text-only.expanded .card-title{-webkit-line-clamp:unset}
.card.text-only .card-expand{text-align:center;font-size:0.68rem;color:var(--mut);padding:0.35rem 0 0.5rem;border-top:1px solid var(--border);margin:0.4rem 0.65rem 0}
.sentinel{text-align:center;font-size:0.7rem;color:var(--mut);padding:1rem 0}

/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--app-w);display:flex;background:rgba(10,10,10,0.97);border-top:1px solid var(--border);z-index:20;padding:0.3rem 0 max(0.3rem,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0.25rem 0;color:var(--mut);position:relative}
.nav-item .icon{font-size:1.25rem;line-height:1}
.nav-item .label{font-size:0.55rem}
.nav-item::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;border-radius:1px;background:var(--accent);transition:width .2s}
.nav-item.active{color:var(--accent)}
.nav-item.active::after{width:20px}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.94);align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img,.lightbox video{max-width:92vw;max-height:85vh;object-fit:contain;border-radius:4px}
.lb-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);color:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="app">

<div class="search-bar">
  <div class="search-input-wrap">
    <span class="icon">🔍</span>
    <input type="text" placeholder="搜尋筆記…" id="search-input">
  </div>
  <button class="btn-icon">⏳</button>
</div>

<div class="chip-bar" id="chip-bar">
  <button class="chip active" data-chip="fantasy">異想空間</button>
  <button class="chip" data-chip="news">大事件</button>
  <button class="chip" data-chip="guaba">吃瓜爆料</button>
  <button class="chip" data-chip="drama">AI短劇</button>
  <button class="chip" data-chip="xv">xvideo</button>
</div>

<main class="app-content">
  <div class="tab-panel active" id="panel-fantasy">
    <div class="waterfall" id="wf-fantasy"></div>
    <div class="sentinel">— 載入更多 —</div>
  </div>
  <div class="tab-panel" id="panel-news">
    <div class="waterfall" id="wf-news"></div>
    <div class="sentinel">— 載入更多 —</div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-item active" data-tab="fantasy"><span class="icon">🏠</span><span class="label">異想</span></button>
  <button class="nav-item" data-tab="news"><span class="icon">📰</span><span class="label">大事件</span></button>
  <button class="nav-item" data-tab="guaba"><span class="icon">🔥</span><span class="label">吃瓜</span></button>
  <button class="nav-item" data-tab="drama"><span class="icon">🎬</span><span class="label">AI短</span></button>
  <button class="nav-item" data-tab="xv"><span class="icon">❌</span><span class="label">xv</span></button>
</nav>
</div>

<div class="lightbox" id="lightbox">
  <span class="lb-close" id="lb-close">&times;</span>
  <img id="lb-img" src="" alt="">
  <div id="lb-embed" style="display:none;width:92vw;max-width:500px"></div>
</div>

<script>
'use strict';
function ph(w,h,label,color){
  return "data:image/svg+xml,"+encodeURIComponent(
    "<svg xmlns='http://www.w3.org/2000/svg' width='"+w+"' height='"+h+"'>"
    +"<rect fill='"+color+"' width='"+w+"' height='"+h+"'/>"
    +"<text x='"+(w/2)+"' y='"+(h/2)+"' text-anchor='middle' fill='#524f4a' font-size='20' dy='.3em'>"+label+"</text></svg>");
}
var COLORS=['#141822','#181414','#141a18','#1a1620'];
function fmtNum(n){ return n>=1000?(n/1000).toFixed(1).replace('.0','')+'k':String(n); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var MOCK={
  fantasy:[
    {text:'今日最新夢幻美圖合集，精選多張寫真',cover:ph(400,530,'🖼 #1','#141822'),badge:'📷 4',author:'男人的幻想',likes:2300,comments:45,
     media:[{src:ph(800,600,'🖼','#141822'),type:'photo'},{src:ph(800,500,'🖼','#181414'),type:'photo'}]},
    {text:'單張封面精選，高畫質寫真不容錯過',cover:ph(400,480,'🖼 #2','#181414'),author:'AIguoman18',likes:856,comments:12},
    {text:'影片預覽 — 點擊查看完整精彩版本',cover:ph(400,510,'🎬 ','#141a18'),author:'AIguoman18',likes:3400,comments:89,isVideo:true},
    {text:'',cover:null,textOnly:true,full:'今天沒有配圖，純文字快訊：頻道整理公告，近期更新頻率為每日兩次，感謝大家支持與回饋，如有問題歡迎留言反應，我們會盡快處理。',author:'男人的幻想',likes:120,comments:5},
    {text:'三連圖系列',cover:ph(400,450,'🖼 #3','#1a1620'),badge:'📷 3',author:'ciyuanb',likes:5600,comments:234},
    {text:'雙拼寫真',cover:ph(400,520,'🖼 #4','#141822'),badge:'📷 2',author:'llcosfc',likes:980,comments:67},
  ],
  news:[
    {text:'東南亞地區今日快訊摘要',cover:ph(400,500,'📰 ','#181414'),author:'東南亞大事件',likes:1500,comments:88},
    {text:'純文字新聞快報：今日重點整理',cover:null,textOnly:true,full:'純文字新聞快報：今日重點事件整理，包含區域政策變動與相關單位回應，詳細內容持續更新中，請留意後續報導。',author:'dashijian',likes:320,comments:15},
    {text:'現場圖集',cover:ph(400,460,'📰 ','#141a18'),badge:'📷 3',author:'xinwen1',likes:780,comments:34},
  ]
};

function renderWaterfall(tabId){
  var wrap=document.getElementById('wf-'+tabId);
  var items=MOCK[tabId]||[];
  var col0=document.createElement('div');col0.className='wf-col';
  var col1=document.createElement('div');col1.className='wf-col';
  var ci=0;
  items.forEach(function(m,idx){
    if(m.textOnly){
      col0.insertAdjacentHTML('beforeend','<div class="card text-only"><div class="card-title">'+esc(m.full)+'</div><div class="card-footer"><div class="card-author"><div class="card-author-avatar">'+m.author[0]+'</div><span class="card-author-name">'+esc(m.author)+'</span></div><div class="card-stats"><span>♥ '+fmtNum(m.likes)+'</span><span>💬 '+m.comments+'</span></div></div><div class="card-expand">展開詳情 ▾</div></div>');
      return;
    }
    var badge=m.badge||'';
    var play=m.isVideo?'<span class="badge-play"></span>':'';
    var html='<div class="card" data-idx="'+idx+'" data-tab="'+tabId+'">'
      +'<div class="card-cover"><img src="'+m.cover+'" loading="lazy">'+badge+play+'</div>'
      +'<div class="card-title">'+esc(m.text)+'</div>'
      +'<div class="card-footer">'
      +'<div class="card-author"><div class="card-author-avatar">'+m.author[0]+'</div><span class="card-author-name">'+esc(m.author)+'</span></div>'
      +'<div class="card-stats"><span>♥ '+fmtNum(m.likes)+'</span><span>💬 '+m.comments+'</span></div>'
      +'</div></div>';
    var target=(ci%2===0)?col0:col1;
    target.insertAdjacentHTML('beforeend',html);
    ci++;
  });
  wrap.innerHTML='';
  wrap.appendChild(col0);wrap.appendChild(col1);
}

renderWaterfall('fantasy');
renderWaterfall('news');

/* chip bar */
document.querySelectorAll('.chip').forEach(function(c){
  c.addEventListener('click',function(){
    document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('active');});
    c.classList.add('active');
    var chip=c.getAttribute('data-chip');
    var tabMap={fantasy:'fantasy',news:'news',guaba:'fantasy',drama:'fantasy',xv:'fantasy'};
    document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
    document.getElementById('panel-'+tabMap[chip]).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
    var nb=document.querySelector('.nav-item[data-tab="'+tabMap[chip]+'"]');
    if(nb)nb.classList.add('active');
  });
});

/* bottom nav */
document.querySelectorAll('.nav-item').forEach(function(item){
  item.addEventListener('click',function(){
    var tab=item.getAttribute('data-tab');
    if(!MOCK[tab])return;
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
    item.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
    document.getElementById('panel-'+tab).classList.add('active');
  });
});

/* text card expand */
document.addEventListener('click',function(e){
  var tc=e.target.closest('.card.text-only');
  if(tc){
    tc.classList.toggle('expanded');
    var exp=tc.querySelector('.card-expand');
    exp.textContent=tc.classList.contains('expanded')?'收合 ▴':'展開詳情 ▾';
  }
});

/* search */
document.getElementById('search-input').addEventListener('input',function(){
  var kw=this.value.toLowerCase();
  document.querySelectorAll('.card').forEach(function(c){
    var title=c.querySelector('.card-title');
    if(!title)return;
    c.style.display=title.textContent.toLowerCase().includes(kw)?'':'none';
  });
});

/* lightbox */
var lightbox=document.getElementById('lightbox');
var lbImg=document.getElementById('lb-img');
document.addEventListener('click',function(e){
  var card=e.target.closest('.card:not(.text-only)');
  if(card){
    var idx=parseInt(card.getAttribute('data-idx'));
    var tab=card.getAttribute('data-tab');
    var m=MOCK[tab][idx];
    if(m.isVideo){
      document.getElementById('lb-embed').innerHTML='<video src="" controls autoplay style="max-width:92vw;max-height:85vh;border-radius:4px"><p>影片播放示範</p></video>';
      document.getElementById('lb-embed').style.display='';
      lbImg.style.display='none';
    }else{
      document.getElementById('lb-embed').style.display='none';
      lbImg.style.display='';
      lbImg.src=m.cover;
    }
    lightbox.classList.add('open');
  }
});
document.getElementById('lb-close').addEventListener('click',function(){
  lightbox.classList.remove('open');
  document.getElementById('lb-embed').innerHTML='';
});
lightbox.addEventListener('click',function(e){if(e.target===lightbox)lightbox.classList.remove('open');});
</script>
</body>
</html>
